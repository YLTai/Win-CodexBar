name: Build Win-CodexBar for Windows

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: "要编译的 owner/repository"
        required: true
        default: "Finesssee/Win-CodexBar"

      source_ref:
        description: "Tag、分支或完整 commit SHA"
        required: true
        default: "v0.42.0"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 180

    env:
      SOURCE_REPOSITORY: ${{ inputs.source_repository }}
      REQUESTED_REF: ${{ inputs.source_ref }}
      BUILD_ROOT: "${{ runner.temp }}\\Win-CodexBar-release"
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Checkout selected source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve exact commit
        shell: pwsh
        run: |
          $sha = (git rev-parse HEAD).Trim()

          if ($sha -notmatch '^[0-9a-fA-F]{40}$') {
            throw "无法解析完整 commit SHA：$sha"
          }

          "RESOLVED_SHA=$sha" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

          Write-Host "Requested ref: $env:REQUESTED_REF"
          Write-Host "Resolved SHA:  $sha"
          git show --no-patch --format=fuller HEAD

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Set up pnpm and Rust
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.18.1 --activate

          rustup toolchain install `
            stable-x86_64-pc-windows-msvc `
            --profile minimal

          rustup default stable-x86_64-pc-windows-msvc

          Write-Host "Node:"
          node --version

          Write-Host "pnpm:"
          pnpm --version

          Write-Host "Rust:"
          rustc --version
          cargo --version

      - name: Build installer and portable package
        shell: pwsh
        env:
          REPO_URL: https://github.com/${{ inputs.source_repository }}.git
        run: |
          .\scripts\windows-release-build.ps1 `
            -Ref $env:RESOLVED_SHA `
            -RepoUrl $env:REPO_URL `
            -WorkRoot $env:BUILD_ROOT `
            -RefreshInstallerDependencies `
            -SmokeInstall

      - name: Record provenance and checksums
        shell: pwsh
        run: |
          $assets = Join-Path $env:BUILD_ROOT "assets"

          if (-not (Test-Path $assets)) {
            throw "没有找到构建产物目录：$assets"
          }

          $cargoLockHash = "missing"
          $pnpmLockHash = "missing"

          if (Test-Path "Cargo.lock") {
            $cargoLockHash = (
              Get-FileHash "Cargo.lock" -Algorithm SHA256
            ).Hash.ToLower()
          }

          if (Test-Path "apps/desktop-tauri/pnpm-lock.yaml") {
            $pnpmLockHash = (
              Get-FileHash `
                "apps/desktop-tauri/pnpm-lock.yaml" `
                -Algorithm SHA256
            ).Hash.ToLower()
          }

          @(
            "source_repository=$env:SOURCE_REPOSITORY"
            "requested_ref=$env:REQUESTED_REF"
            "source_commit=$env:RESOLVED_SHA"
            "github_run_id=${{ github.run_id }}"
            "github_run_attempt=${{ github.run_attempt }}"
            "runner_os=$env:RUNNER_OS"
            "runner_image=$env:ImageOS"
            "runner_image_version=$env:ImageVersion"
            "cargo_lock_sha256=$cargoLockHash"
            "pnpm_lock_sha256=$pnpmLockHash"
          ) | Set-Content `
                (Join-Path $assets "BUILD-PROVENANCE.txt") `
                -Encoding utf8

          Get-ChildItem $assets -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            ForEach-Object {
              $hash = Get-FileHash $_.FullName -Algorithm SHA256
              "$($hash.Hash.ToLower())  $($_.Name)"
            } |
            Set-Content `
              (Join-Path $assets "SHA256SUMS.txt") `
              -Encoding ascii

          Get-Content (Join-Path $assets "BUILD-PROVENANCE.txt")
          Get-Content (Join-Path $assets "SHA256SUMS.txt")

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Win-CodexBar-${{ github.run_id }}
          path: "${{ runner.temp }}\\Win-CodexBar-release\\assets\\*"
          if-no-files-found: error
          retention-days: 14
