name: Build Win-CodexBar for Windows

run-name: Build ${{ inputs.source_repository }}@${{ inputs.source_ref }}

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: "要编译的公开仓库，格式为 owner/repository"
        required: true
        default: "Finesssee/Win-CodexBar"
        type: string

      source_ref:
        description: "要编译的 tag、分支或完整 commit SHA"
        required: true
        default: "v0.42.0"
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Windows release build
    runs-on: windows-2025
    timeout-minutes: 180

    env:
      SOURCE_REPOSITORY: ${{ inputs.source_repository }}
      REQUESTED_REF: ${{ inputs.source_ref }}
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: "never"
      NO_COLOR: "1"

    steps:
      - name: Validate inputs
        shell: pwsh
        run: |
          if (
            $env:SOURCE_REPOSITORY -notmatch
            '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'
          ) {
            throw "source_repository 格式无效，应为 owner/repository。"
          }

          if ([string]::IsNullOrWhiteSpace($env:REQUESTED_REF)) {
            throw "source_ref 不能为空。"
          }

          if ($env:REQUESTED_REF -match "[`r`n]") {
            throw "source_ref 不能包含换行符。"
          }

      - name: Checkout selected source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve source commit and build paths
        shell: pwsh
        run: |
          $sha = (git rev-parse HEAD).Trim()

          if ($sha -notmatch '^[0-9a-fA-F]{40}$') {
            throw "无法解析完整 commit SHA：$sha"
          }

          $buildRoot = Join-Path `
            $env:RUNNER_TEMP `
            "Win-CodexBar-release"

          $assetsDir = Join-Path `
            $buildRoot `
            "assets"

          "RESOLVED_SHA=$sha" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          "BUILD_ROOT=$buildRoot" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          "ASSETS_DIR=$assetsDir" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          Write-Host "Repository:    $env:SOURCE_REPOSITORY"
          Write-Host "Requested ref: $env:REQUESTED_REF"
          Write-Host "Resolved SHA:  $sha"
          Write-Host "Build root:    $buildRoot"

          git show --no-patch --format=fuller HEAD

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Set up pnpm and Rust
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.18.1 --activate

          rustup set auto-self-update disable

          rustup toolchain install `
            stable-x86_64-pc-windows-msvc `
            --profile minimal

          rustup default `
            stable-x86_64-pc-windows-msvc

          Write-Host "Node:"
          node --version

          Write-Host "pnpm:"
          pnpm --version

          Write-Host "Rust:"
          rustc --version
          cargo --version

      - name: Verify required build tools
        shell: pwsh
        run: |
          $innoCandidates = @(
            (
              Join-Path `
                ${env:ProgramFiles(x86)} `
                "Inno Setup 6\ISCC.exe"
            ),
            (
              Join-Path `
                $env:ProgramFiles `
                "Inno Setup 6\ISCC.exe"
            ),
            (
              Join-Path `
                $env:LOCALAPPDATA `
                "Programs\Inno Setup 6\ISCC.exe"
            )
          )

          $iscc = $innoCandidates |
            Where-Object {
              $_ -and (Test-Path $_)
            } |
            Select-Object -First 1

          if (-not $iscc) {
            $command = Get-Command `
              "ISCC.exe" `
              -ErrorAction SilentlyContinue

            if ($command) {
              $iscc = $command.Source
            }
          }

          if (-not $iscc) {
            throw "未找到 Inno Setup 6 的 ISCC.exe。"
          }

          Write-Host "Inno Setup: $iscc"

          $vswhere = Join-Path `
            ${env:ProgramFiles(x86)} `
            "Microsoft Visual Studio\Installer\vswhere.exe"

          if (-not (Test-Path $vswhere)) {
            throw "未找到 Visual Studio 的 vswhere.exe。"
          }

          $visualStudioPath = & $vswhere `
            -latest `
            -products * `
            -requires `
              Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (
            $LASTEXITCODE -ne 0 -or
            [string]::IsNullOrWhiteSpace(
              ($visualStudioPath -join "")
            )
          ) {
            throw "未找到 Visual Studio C++ Build Tools。"
          }

          Write-Host "Visual Studio:"
          $visualStudioPath

      - name: Build installer and portable package
        shell: pwsh
        env:
          REPO_URL: >-
            https://github.com/${{
            inputs.source_repository }}.git
        run: |
          .\scripts\windows-release-build.ps1 `
            -Ref $env:RESOLVED_SHA `
            -RepoUrl $env:REPO_URL `
            -WorkRoot $env:BUILD_ROOT `
            -RefreshInstallerDependencies `
            -SmokeInstall

      - name: Record provenance and checksums
        shell: pwsh
        run: |
          if (-not (Test-Path $env:ASSETS_DIR)) {
            throw "没有找到构建产物目录：$env:ASSETS_DIR"
          }

          $cargoLockHash = "missing"
          $pnpmLockHash = "missing"

          if (Test-Path "Cargo.lock") {
            $cargoLockHash = (
              Get-FileHash `
                "Cargo.lock" `
                -Algorithm SHA256
            ).Hash.ToLowerInvariant()
          }

          if (
            Test-Path `
              "apps/desktop-tauri/pnpm-lock.yaml"
          ) {
            $pnpmLockHash = (
              Get-FileHash `
                "apps/desktop-tauri/pnpm-lock.yaml" `
                -Algorithm SHA256
            ).Hash.ToLowerInvariant()
          }

          @(
            "source_repository=$env:SOURCE_REPOSITORY"
            "requested_ref=$env:REQUESTED_REF"
            "source_commit=$env:RESOLVED_SHA"
            "github_workflow_ref=${{ github.workflow_ref }}"
            "github_run_id=${{ github.run_id }}"
            "github_run_attempt=${{ github.run_attempt }}"
            "runner_os=$env:RUNNER_OS"
            "runner_arch=$env:RUNNER_ARCH"
            "runner_image=$env:ImageOS"
            "runner_image_version=$env:ImageVersion"
            "node_version=$(node --version)"
            "pnpm_version=$(pnpm --version)"
            "rustc_version=$(rustc --version)"
            "cargo_lock_sha256=$cargoLockHash"
            "pnpm_lock_sha256=$pnpmLockHash"
          ) |
            Set-Content `
              (
                Join-Path `
                  $env:ASSETS_DIR `
                  "BUILD-PROVENANCE.txt"
              ) `
              -Encoding utf8

          Get-ChildItem `
            $env:ASSETS_DIR `
            -File |
            Where-Object {
              $_.Name -ne "SHA256SUMS.txt"
            } |
            Sort-Object Name |
            ForEach-Object {
              $hash = Get-FileHash `
                $_.FullName `
                -Algorithm SHA256

              "$(
                $hash.Hash.ToLowerInvariant()
              )  $($_.Name)"
            } |
            Set-Content `
              (
                Join-Path `
                  $env:ASSETS_DIR `
                  "SHA256SUMS.txt"
              ) `
              -Encoding ascii

          Write-Host "Build provenance:"

          Get-Content (
            Join-Path `
              $env:ASSETS_DIR `
              "BUILD-PROVENANCE.txt"
          )

          Write-Host "Checksums:"

          Get-Content (
            Join-Path `
              $env:ASSETS_DIR `
              "SHA256SUMS.txt"
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Win-CodexBar-${{ env.RESOLVED_SHA }}
          path: ${{ env.ASSETS_DIR }}\*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
